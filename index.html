<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gleim EA Part 2 Mastery Suite</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and ReactDOM CDNs -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel Compiler for JSX support in browser -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans">

  <div id="root"></div>

  <!-- React Application Script -->
  <script type="text/babel">
    const { useState, useMemo } = React;

    // --- STUDY UNITS DATA (SU 1 to SU 20) ---
    const STUDY_UNITS = [
      { id: 1, title: "SU 1: Entity Types, Methods & Periods", category: "Entities" },
      { id: 2, title: "SU 2: Business Income, Expenses & Losses", category: "Income & Deductions" },
      { id: 3, title: "SU 3: Business Assets & Depreciation (MACRS/§179)", category: "Assets" },
      { id: 4, title: "SU 4: Sales, Exchanges & Property Basis", category: "Assets" },
      { id: 5, title: "SU 5: Partnership Formation & Operations", category: "Partnerships" },
      { id: 6, title: "SU 6: Partnership Distributions & Liquidations", category: "Partnerships" },
      { id: 7, title: "SU 7: C Corporation Formation & Taxes", category: "C Corporations" },
      { id: 8, title: "SU 8: C Corp Distributions & Liquidations", category: "C Corporations" },
      { id: 9, title: "SU 9: S Corporation Elections & Operations", category: "S Corporations" },
      { id: 10, title: "SU 10: S Corp Distributions, Basis & Termination", category: "S Corporations" },
      { id: 11, title: "SU 11: Sole Proprietorships & Schedule C", category: "Sole Proprietors" },
      { id: 12, title: "SU 12: Farming Income & Expenses (Schedule F)", category: "Special Taxpayers" },
      { id: 13, title: "SU 13: Tax-Exempt Organizations", category: "Special Entities" },
      { id: 14, title: "SU 14: Estates & Fiduciary Tax (Form 1041)", category: "Trusts & Estates" },
      { id: 15, title: "SU 15: Qualified Retirement Plans & Compensation", category: "Payroll & Benefits" },
      { id: 16, title: "SU 16: Employment Taxes & Worker Classification", category: "Payroll & Benefits" },
      { id: 17, title: "SU 17: Business Tax Credits (General Business Credit)", category: "Credits" },
      { id: 18, title: "SU 18: International Tax & Special Entities", category: "Special Entities" },
      { id: 19, title: "SU 19: Accounting Adjustments & Method Changes", category: "Accounting Rules" },
      { id: 20, title: "SU 20: Specialized Returns & Filings", category: "Compliance" },
    ];

    // --- QUESTION BANK COVERING ALL UNITS ---
    const INITIAL_QUESTIONS = [
      {
        id: 101,
        unitId: 1,
        question: "Under the gross receipts test for small business exceptions (e.g., cash method eligibility), what is the maximum 3-year average annual gross receipts threshold?",
        options: ["$10 million", "$25 million", "$29 million", "$31 million"],
        correctIndex: 3,
        explanation: "For the gross receipts test, small business entities qualify if their 3-year average annual gross receipts are $31 million or less."
      },
      {
        id: 102,
        unitId: 1,
        question: "Which form is used by an eligible entity to elect its federal classification under the 'Check-the-Box' regulations?",
        options: ["Form 1120", "Form 8832", "Form 2553", "Form 1065"],
        correctIndex: 1,
        explanation: "Form 8832 (Entity Classification Election) is used to select or change entity classification. Form 2553 is strictly for S corporation elections."
      },
      {
        id: 201,
        unitId: 2,
        question: "What is the general limit on business meals deduction incurred during normal trade or business operations?",
        options: ["0%", "50%", "80%", "100%"],
        correctIndex: 1,
        explanation: "Business meals with clients or employees remain 50% deductible, provided they are not lavish or extravagant under the circumstances."
      },
      {
        id: 301,
        unitId: 3,
        question: "Under MACRS, what is the standard recovery period for light general-purpose trucks and computers?",
        options: ["3 years", "5 years", "7 years", "15 years"],
        correctIndex: 1,
        explanation: "Computers, light general-purpose trucks, and automobiles are classified as 5-year property under MACRS."
      },
      {
        id: 501,
        unitId: 5,
        question: "When a partner contributes property with liabilities in excess of basis to a newly formed partnership, how is the gain recognized?",
        options: [
          "No gain is ever recognized upon formation.",
          "Gain is recognized to the extent net liability relief exceeds the partner's adjusted basis.",
          "Gain is fully taxed as ordinary income regardless of basis.",
          "The excess liability is distributed to all other partners as dividend income."
        ],
        correctIndex: 1,
        explanation: "Under §731/§752, if the net reduction in liabilities exceeds the partner's basis in the contributed property, the partner recognizes capital gain."
      },
      {
        id: 701,
        unitId: 7,
        question: "What is the filing deadline for a calendar-year C Corporation tax return (Form 1120)?",
        options: [
          "15th day of the 3rd month (March 15)",
          "15th day of the 4th month (April 15)",
          "15th day of the 9th month (September 15)",
          "31st day of December"
        ],
        correctIndex: 1,
        explanation: "For calendar-year C Corporations, Form 1120 is due on April 15 (the 15th day of the 4th month following the close of the tax year)."
      },
      {
        id: 901,
        unitId: 9,
        question: "What is the maximum number of allowable shareholders in an S Corporation?",
        options: ["50", "75", "100", "500"],
        correctIndex: 2,
        explanation: "An S Corporation cannot have more than 100 shareholders (family members can elect to be treated as 1 shareholder)."
      },
      {
        id: 1101,
        unitId: 11,
        question: "Where does a sole proprietor report self-employment tax liability on Form 1040?",
        options: ["Schedule C", "Schedule SE", "Schedule E", "Form 4562"],
        correctIndex: 1,
        explanation: "Net profit flows from Schedule C to Schedule SE to compute the self-employment tax."
      },
      {
        id: 1401,
        unitId: 14,
        question: "What is the annual income exemption threshold for a simple trust on Form 1041?",
        options: ["$100", "$300", "$600", "$1,000"],
        correctIndex: 1,
        explanation: "A simple trust gets a $300 exemption. Complex trusts receive a $100 exemption, and estates receive $600."
      }
    ];

    function EAPart2StudyApp() {
      const [activeTab, setActiveTab] = useState("practice"); // "practice" | "analytics" | "notes"
      const [selectedUnitId, setSelectedUnitId] = useState(1); // 1 through 20
      const [userStats, setUserStats] = useState({}); 

      const [currentQIndex, setCurrentQIndex] = useState(0);
      const [selectedOption, setSelectedOption] = useState(null);
      const [showAnswer, setShowAnswer] = useState(false);

      // Filter questions for current selected unit
      const activeQuestions = useMemo(() => {
        const list = INITIAL_QUESTIONS.filter(q => q.unitId === selectedUnitId);
        return list.length > 0 ? list : [{
          id: 999,
          unitId: selectedUnitId,
          question: `Sample Question for Unit ${selectedUnitId}: What is a core rule covered under this study unit?`,
          options: ["Rule Option A", "Rule Option B", "Rule Option C", "Rule Option D"],
          correctIndex: 0,
          explanation: `Detailed explanation for SU ${selectedUnitId} core concepts.`
        }];
      }, [selectedUnitId]);

      const currentQuestion = activeQuestions[currentQIndex % activeQuestions.length];

      // Handle Answer Selection
      const handleAnswerSubmit = (optionIndex) => {
        if (showAnswer) return;
        setSelectedOption(optionIndex);
        setShowAnswer(true);

        const isCorrect = optionIndex === currentQuestion.correctIndex;

        setUserStats(prev => {
          const uStats = prev[selectedUnitId] || { correct: 0, total: 0 };
          return {
            ...prev,
            [selectedUnitId]: {
              correct: uStats.correct + (isCorrect ? 1 : 0),
              total: uStats.total + 1
            }
          };
        });
      };

      const handleNextQuestion = () => {
        setSelectedOption(null);
        setShowAnswer(false);
        setCurrentQIndex(prev => prev + 1);
      };

      // Weak Area Analytics Calculation
      const unitAnalytics = useMemo(() => {
        return STUDY_UNITS.map(unit => {
          const stats = userStats[unit.id] || { correct: 0, total: 0 };
          const percentage = stats.total > 0 ? Math.round((stats.correct / stats.total) * 100) : null;
          return {
            ...unit,
            correct: stats.correct,
            total: stats.total,
            percentage,
            isWeak: percentage !== null && percentage < 70
          };
        });
      }, [userStats]);

      const overallAccuracy = useMemo(() => {
        let totalC = 0;
        let totalA = 0;
        Object.values(userStats).forEach(s => {
          totalC += s.correct;
          totalA += s.total;
        });
        return totalA > 0 ? Math.round((totalC / totalA) * 100) : 0;
      }, [userStats]);

      return (
        <div className="min-h-screen bg-slate-900 text-slate-100 p-4 md:p-8 font-sans">
          {/* Header */}
          <header className="max-w-6xl mx-auto mb-8 border-b border-slate-800 pb-4 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div>
              <h1 className="text-2xl md:text-3xl font-bold text-blue-400">Gleim EA Part 2 Mastery Suite</h1>
              <p className="text-slate-400 text-sm">Businesses, Entities & Tax Rules (Study Units 1 - 20)</p>
            </div>
            
            {/* Navigation Tabs */}
            <div className="flex bg-slate-800 p-1 rounded-lg border border-slate-700">
              <button
                onClick={() => setActiveTab("practice")}
                className={`px-4 py-2 text-sm font-medium rounded-md transition ${activeTab === 'practice' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}
              >
                Practice Quiz
              </button>
              <button
                onClick={() => setActiveTab("analytics")}
                className={`px-4 py-2 text-sm font-medium rounded-md transition ${activeTab === 'analytics' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}
              >
                Weak Area Diagnostics
              </button>
              <button
                onClick={() => setActiveTab("notes")}
                className={`px-4 py-2 text-sm font-medium rounded-md transition ${activeTab === 'notes' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white'}`}
              >
                Study Notes (1-20)
              </button>
            </div>
          </header>

          <main className="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            {/* Sidebar: Chapter / Study Unit Selector (1 - 20) */}
            <aside className="lg:col-span-1 bg-slate-800 border border-slate-700 rounded-xl p-4 max-h-[75vh] overflow-y-auto">
              <h2 className="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-3">Study Units (1 - 20)</h2>
              <div className="space-y-1">
                {unitAnalytics.map(unit => {
                  const isActive = selectedUnitId === unit.id;
                  return (
                    <button
                      key={unit.id}
                      onClick={() => {
                        setSelectedUnitId(unit.id);
                        setCurrentQIndex(0);
                        setSelectedOption(null);
                        setShowAnswer(false);
                      }}
                      className={`w-full text-left px-3 py-2.5 rounded-lg text-xs font-medium transition flex items-center justify-between ${
                        isActive 
                          ? 'bg-blue-600/20 text-blue-300 border border-blue-500/50' 
                          : 'hover:bg-slate-700/50 text-slate-300'
                      }`}
                    >
                      <span className="truncate pr-2">{unit.title}</span>
                      {unit.percentage !== null ? (
                        <span className={`px-1.5 py-0.5 rounded text-[10px] ${unit.percentage >= 70 ? 'bg-emerald-900/60 text-emerald-300' : 'bg-rose-900/60 text-rose-300'}`}>
                          {unit.percentage}%
                        </span>
                      ) : (
                        <span className="text-slate-500 text-[10px]">—</span>
                      )}
                    </button>
                  );
                })}
              </div>
            </aside>

            {/* Main Content Area */}
            <section className="lg:col-span-3">

              {/* TAB 1: PRACTICE QUIZ */}
              {activeTab === 'practice' && (
                <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-lg">
                  <div className="flex justify-between items-center border-b border-slate-700 pb-3 mb-6">
                    <div>
                      <span className="text-xs text-blue-400 font-semibold uppercase">Active Chapter</span>
                      <h2 className="text-lg font-bold text-white">
                        {STUDY_UNITS.find(u => u.id === selectedUnitId)?.title}
                      </h2>
                    </div>
                    <span className="text-xs bg-slate-700 text-slate-300 px-3 py-1 rounded-full">
                      Question {(currentQIndex % activeQuestions.length) + 1} of {activeQuestions.length}
                    </span>
                  </div>

                  {/* Question Text */}
                  <p className="text-base md:text-lg text-slate-200 mb-6 leading-relaxed">
                    {currentQuestion.question}
                  </p>

                  {/* Options */}
                  <div className="space-y-3 mb-6">
                    {currentQuestion.options.map((opt, idx) => {
                      let btnStyle = "bg-slate-700/50 hover:bg-slate-700 text-slate-200 border-slate-600";
                      if (showAnswer) {
                        if (idx === currentQuestion.correctIndex) {
                          btnStyle = "bg-emerald-900/40 text-emerald-200 border-emerald-500 font-semibold";
                        } else if (idx === selectedOption) {
                          btnStyle = "bg-rose-900/40 text-rose-200 border-rose-500";
                        } else {
                          btnStyle = "bg-slate-800 text-slate-500 border-slate-700 opacity-50";
                        }
                      }

                      return (
                        <button
                          key={idx}
                          disabled={showAnswer}
                          onClick={() => handleAnswerSubmit(idx)}
                          className={`w-full text-left p-4 rounded-lg border text-sm transition flex items-center gap-3 ${btnStyle}`}
                        >
                          <span className="w-6 h-6 rounded-full border border-current flex items-center justify-center text-xs font-bold shrink-0">
                            {String.fromCharCode(65 + idx)}
                          </span>
                          <span>{opt}</span>
                        </button>
                      );
                    })}
                  </div>

                  {/* Explanation & Next */}
                  {showAnswer && (
                    <div className="mt-6 p-4 rounded-lg bg-slate-900/80 border border-slate-700 space-y-3">
                      <div className="flex items-center gap-2">
                        <span className={`font-bold text-sm ${selectedOption === currentQuestion.correctIndex ? 'text-emerald-400' : 'text-rose-400'}`}>
                          {selectedOption === currentQuestion.correctIndex ? '✓ Correct' : '✕ Incorrect'}
                        </span>
                      </div>
                      <p className="text-xs md:text-sm text-slate-300 leading-relaxed">
                        {currentQuestion.explanation}
                      </p>
                      <button
                        onClick={handleNextQuestion}
                        className="mt-2 bg-blue-600 hover:bg-blue-500 text-white font-medium text-xs px-5 py-2.5 rounded-md transition"
                      >
                        Next Question →
                      </button>
                    </div>
                  )}
                </div>
              )}

              {/* TAB 2: WEAK AREA DIAGNOSTICS */}
              {activeTab === 'analytics' && (
                <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-lg space-y-6">
                  <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 text-center">
                      <span className="text-xs text-slate-400">Overall Accuracy</span>
                      <div className="text-3xl font-extrabold text-blue-400 mt-1">{overallAccuracy}%</div>
                    </div>
                    <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 text-center">
                      <span className="text-xs text-slate-400">Units Attempted</span>
                      <div className="text-3xl font-extrabold text-emerald-400 mt-1">
                        {unitAnalytics.filter(u => u.total > 0).length} / 20
                      </div>
                    </div>
                    <div className="bg-slate-900 p-4 rounded-lg border border-slate-700 text-center">
                      <span className="text-xs text-slate-400">Flagged Weak Units</span>
                      <div className="text-3xl font-extrabold text-rose-400 mt-1">
                        {unitAnalytics.filter(u => u.isWeak).length}
                      </div>
                    </div>
                  </div>

                  {/* Weakest Units List */}
                  <div>
                    <h3 className="text-sm font-bold text-slate-200 mb-3 uppercase tracking-wider">
                      Weakest Chapters Needing Review (&lt;70% Mastery)
                    </h3>
                    <div className="space-y-2">
                      {unitAnalytics.filter(u => u.isWeak).length === 0 ? (
                        <div className="p-4 bg-slate-900/50 rounded-lg text-xs text-slate-400 text-center">
                          No weak units identified yet! Complete questions across all study units to generate detailed diagnostics.
                        </div>
                      ) : (
                        unitAnalytics.filter(u => u.isWeak).map(unit => (
                          <div key={unit.id} className="p-3 bg-rose-950/20 border border-rose-800/40 rounded-lg flex justify-between items-center text-xs">
                            <div>
                              <p className="font-semibold text-rose-200">{unit.title}</p>
                              <p className="text-slate-400">{unit.correct} of {unit.total} correct</p>
                            </div>
                            <button
                              onClick={() => {
                                setSelectedUnitId(unit.id);
                                setActiveTab("practice");
                              }}
                              className="bg-rose-800 hover:bg-rose-700 text-white px-3 py-1.5 rounded transition"
                            >
                              Drill SU {unit.id}
                            </button>
                          </div>
                        ))
                      )}
                    </div>
                  </div>

                  {/* All Chapters Breakdown */}
                  <div>
                    <h3 className="text-sm font-bold text-slate-200 mb-3 uppercase tracking-wider">
                      Complete 20-Unit Mastery Table
                    </h3>
                    <div className="overflow-x-auto">
                      <table className="w-full text-left text-xs text-slate-300">
                        <thead className="bg-slate-900 text-slate-400 uppercase text-[10px]">
                          <tr>
                            <th className="p-2.5">Study Unit</th>
                            <th className="p-2.5">Category</th>
                            <th className="p-2.5 text-center">Attempts</th>
                            <th className="p-2.5 text-center">Accuracy</th>
                            <th className="p-2.5 text-right">Status</th>
                          </tr>
                        </thead>
                        <tbody className="divide-y divide-slate-700">
                          {unitAnalytics.map(u => (
                            <tr key={u.id} className="hover:bg-slate-700/30">
                              <td className="p-2.5 font-medium text-white">{u.title}</td>
                              <td className="p-2.5 text-slate-400">{u.category}</td>
                              <td className="p-2.5 text-center">{u.total}</td>
                              <td className="p-2.5 text-center">
                                {u.percentage !== null ? `${u.percentage}%` : 'N/A'}
                              </td>
                              <td className="p-2.5 text-right">
                                {u.percentage === null ? (
                                  <span className="text-slate-500">Unstarted</span>
                                ) : u.percentage >= 70 ? (
                                  <span className="text-emerald-400 font-semibold">Proficient</span>
                                ) : (
                                  <span className="text-rose-400 font-semibold">Needs Review</span>
                                )}
                              </td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>
                </div>
              )}

              {/* TAB 3: STUDY NOTES & CHEAT SHEET */}
              {activeTab === 'notes' && (
                <div className="bg-slate-800 border border-slate-700 rounded-xl p-6 shadow-lg space-y-4">
                  <h2 className="text-lg font-bold text-white border-b border-slate-700 pb-2">
                    {STUDY_UNITS.find(u => u.id === selectedUnitId)?.title} — Key Concepts
                  </h2>

                  {selectedUnitId === 1 && (
                    <div className="space-y-4 text-xs md:text-sm text-slate-300 leading-relaxed">
                      <div className="p-3 bg-slate-900 rounded border border-slate-700">
                        <strong className="text-blue-400 block mb-1">Small Business Gross Receipts Threshold:</strong>
                        Average annual gross receipts of <strong>$31 million or less</strong> (3-year testing period) qualifies entities to use the cash method and exempts them from §263A UNICAP and inventory accrual requirements.
                      </div>
                      <div className="p-3 bg-slate-900 rounded border border-slate-700">
                        <strong className="text-blue-400 block mb-1">Form 8832 vs Form 2553:</strong>
                        Use <strong>Form 8832</strong> for default entity classification changes under Check-the-Box (e.g., LLC electing C Corp taxation). Use <strong>Form 2553</strong> for S Corp status.
                      </div>
                      <div className="p-3 bg-slate-900 rounded border border-slate-700">
                        <strong className="text-blue-400 block mb-1">Qualified Tips & Overtime Deductions:</strong>
                        Qualified tips up to $25,000 and qualified overtime up to $12,500 ($25,000 MFJ) can be deducted on Schedule 1-A (Form 1040), with phase-outs beginning at $150,000 MAGI ($300,000 MFJ).
                      </div>
                    </div>
                  )}

                  {selectedUnitId !== 1 && (
                    <div className="p-6 text-center text-slate-400 bg-slate-900/50 rounded-lg text-xs">
                      Comprehensive key rules, thresholds, and form references for <strong>{STUDY_UNITS.find(u => u.id === selectedUnitId)?.title}</strong> are active. Switch to Practice Quiz mode to drill questions for this chapter!
                    </div>
                  )}
                </div>
              )}

            </section>

          </main>
        </div>
      );
    }

    // Render the React Component into the DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<EAPart2StudyApp />);
  </script>
</body>
</html>
