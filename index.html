<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EA Exam Part 2 - Gamified Study Suite</title>
  <style>
    /* ==========================================================================
       THEME STYLES (Soft Pink & Sage Green Aesthetic)
       ========================================================================== */
    :root {
      --bg-color: #f7f3f0;
      --text-color: #2d3732;
      --accent-color: #87a987;
      --panel-bg: #ffffff;
      --panel-border: #e2d7d5;
    }

    /* Millionaire: Soft Rose & Muted Sage */
    body.theme-millionaire {
      --bg-color: #fbeee8;
      --text-color: #2b332e;
      --accent-color: #7a9e7e;
      --panel-bg: #fff8f5;
      --panel-border: #ebd6ce;
    }

    /* Detective: Deep Forest Sage & Pastel Blush */
    body.theme-detective {
      --bg-color: #3b4d43;
      --text-color: #f7f2f0;
      --accent-color: #f0c3be;
      --panel-bg: #2d3c33;
      --panel-border: #4a5e52;
    }

    /* Flashcards: Gentle Sage & Warm Pearl */
    body.theme-flashcards {
      --bg-color: #e9f0ec;
      --text-color: #27332c;
      --accent-color: #92b496;
      --panel-bg: #f9fbf9;
      --panel-border: #d0ded3;
    }

    /* Matrix: Dusty Rose & Soft Eucalyptus */
    body.theme-matrix {
      --bg-color: #f4e9e7;
      --text-color: #2c3630;
      --accent-color: #6b8e73;
      --panel-bg: #fdf8f7;
      --panel-border: #e5d1cd;
    }

    /* Basis: Coral Blush & Deep Sage Alert */
    body.theme-basis {
      --bg-color: #f9ecea;
      --text-color: #332625;
      --accent-color: #d97871;
      --panel-bg: #ffffff;
      --panel-border: #f0c5c1;
    }

    /* ==========================================================================
       GLOBAL BASE STYLES
       ========================================================================== */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      transition: background-color 0.3s ease, border-color 0.3s ease, color 0.3s ease;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      padding: 1.5rem;
    }

    header {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1.5rem;
      border-bottom: 2px solid var(--panel-border);
      margin-bottom: 1.5rem;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 800;
      color: var(--accent-color);
      letter-spacing: 0.5px;
    }

    .controls-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    select, button {
      background: var(--panel-bg);
      color: var(--text-color);
      border: 1.5px solid var(--panel-border);
      padding: 0.5rem 1rem;
      border-radius: 0.75rem;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }

    select:focus, button:hover {
      border-color: var(--accent-color);
      box-shadow: 0 0 10px rgba(135, 169, 135, 0.25);
    }

    button.active {
      background: var(--accent-color);
      color: #fff;
      border-color: var(--accent-color);
    }

    /* ==========================================================================
       MAIN CONTAINER & GAME CARD STYLES
       ========================================================================== */
    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .card {
      background: var(--panel-bg);
      border: 2px solid var(--panel-border);
      border-radius: 1.25rem;
      width: 100%;
      max-width: 650px;
      padding: 2rem;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .card-tag {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      padding: 0.35rem 0.85rem;
      border-radius: 1rem;
      background: rgba(135, 169, 135, 0.15);
      color: var(--accent-color);
      margin-bottom: 1rem;
    }

    .question-text {
      font-size: 1.25rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
    }

    .option-btn {
      text-align: left;
      width: 100%;
      padding: 0.85rem 1.2rem;
      background: rgba(0, 0, 0, 0.02);
      border: 1.5px solid var(--panel-border);
      border-radius: 0.75rem;
      font-size: 1rem;
    }

    .option-btn:hover {
      background: rgba(135, 169, 135, 0.1);
    }

    .feedback {
      margin-top: 1.5rem;
      font-weight: 700;
      min-height: 1.5rem;
    }

    /* ==========================================================================
       FLASHCARD SPECIFIC STYLES
       ========================================================================== */
    .flashcard-inner {
      min-height: 200px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
      cursor: pointer;
    }

    .action-btn {
      margin-top: 1.5rem;
      background: var(--accent-color);
      color: #ffffff;
      width: 100%;
    }
  </style>
</head>
<body class="theme-millionaire">

  <header>
    <h1>EA Exam Suite: Part 2</h1>
    
    <div class="controls-bar">
      <!-- Mode / Theme Switcher -->
      <label for="modeSelect">Mode:</label>
      <select id="modeSelect" onchange="switchMode(this.value)">
        <option value="millionaire">Millionaire Mode</option>
        <option value="detective">Detective Mode</option>
        <option value="flashcards">Flashcards</option>
        <option value="matrix">Matrix Mode</option>
        <option value="basis">Basis Alert</option>
      </select>

      <!-- Domain / Chapter Selector -->
      <label for="domainSelect">Topic:</label>
      <select id="domainSelect" onchange="filterTopic(this.value)">
        <option value="all">All Domains</option>
        <option value="domain1">Domain 1: Entities</option>
        <option value="domain2">Domain 2: Tax Prep & Expenses</option>
        <option value="domain3">Domain 3: Specialized Returns</option>
      </select>
    </div>
  </header>

  <main>
    <div class="card" id="gameCard">
      <span class="card-tag" id="domainTag">Domain 1: Business Entities</span>
      <div id="contentArea">
        <!-- Dynamic Game Content Loads Here -->
      </div>
      <div class="feedback" id="feedback"></div>
    </div>
  </main>

  <script>
    /* ==========================================================================
       1. QUESTION DATABASE & DATA STRUCTURES
       ========================================================================== */
    const questionsDatabase = [
      {
        id: 1,
        domain: "domain1",
        domainName: "Domain 1: Business Entities",
        question: "What is the general tax treatment of a liquidating distribution to a C-Corporation shareholder?",
        options: [
          "Tax-free return of basis only",
          "Treated as full payment in exchange for the stock (Capital Gain/Loss)",
          "Taxed completely as ordinary dividend income",
          "Deferred until the assets are resold"
        ],
        answer: 1,
        explanation: "Liquidating distributions to shareholders are treated as full payment in exchange for their stock under Section 331."
      },
      {
        id: 2,
        domain: "domain2",
        domainName: "Domain 2: Tax Prep & Expenses",
        question: "Under MACRS 5-year property rules, which asset qualifies?",
        options: [
          "Office Furniture",
          "Automobiles & Light Duty Trucks",
          "Residential Rental Real Estate",
          "Nonresidential Real Property"
        ],
        answer: 1,
        explanation: "Automobiles, taxis, buses, and light-duty trucks are classified as 5-year property under MACRS."
      },
      {
        id: 3,
        domain: "domain3",
        domainName: "Domain 3: Specialized Returns",
        question: "Which form is used by tax-exempt organizations to file their annual information return?",
        options: [
          "Form 1041",
          "Form 1120-S",
          "Form 990",
          "Form 1065"
        ],
        answer: 2,
        explanation: "Tax-exempt organizations under Section 501(c) file Form 990 to report activities and financial status."
      }
    ];

    let currentMode = "millionaire";
    let currentDomain = "all";
    let currentIndex = 0;
    let filteredQuestions = [...questionsDatabase];
    let isFlipped = false;

    /* ==========================================================================
       2. BUILT-IN WEB AUDIO SYNTHESIZER
       ========================================================================== */
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (audioCtx.state === 'suspended') {
        audioCtx.resume();
      }

      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);

      const now = audioCtx.currentTime;

      if (type === 'correct') {
        // High Fanfare Chime
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, now); // C5
        osc.frequency.exponentialRampToValueAtTime(659.25, now + 0.1); // E5
        osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.2); // G5
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
        osc.start(now);
        osc.stop(now + 0.4);

      } else if (type === 'wrong') {
        // Low Suspense Buzz
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.linearRampToValueAtTime(80, now + 0.3);
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now);
        osc.stop(now + 0.3);

      } else if (type === 'drumroll') {
        // Suspense Drumroll Tone
        osc.type = 'sine';
        osc.frequency.setValueAtTime(100, now);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        osc.start(now);
        osc.stop(now + 0.15);
      }
    }

    /* ==========================================================================
       3. APPLICATION LOGIC & RENDERING
       ========================================================================== */
    function switchMode(mode) {
      currentMode = mode;
      document.body.className = `theme-${mode}`;
      currentIndex = 0;
      renderCurrentView();
    }

    function filterTopic(domain) {
      currentDomain = domain;
      if (domain === "all") {
        filteredQuestions = [...questionsDatabase];
      } else {
        filteredQuestions = questionsDatabase.filter(q => q.domain === domain);
      }
      currentIndex = 0;
      renderCurrentView();
    }

    function renderCurrentView() {
      const contentArea = document.getElementById("contentArea");
      const domainTag = document.getElementById("domainTag");
      const feedback = document.getElementById("feedback");
      feedback.innerHTML = "";

      if (filteredQuestions.length === 0) {
        domainTag.innerText = "No Questions";
        contentArea.innerHTML = "<p class='question-text'>No questions available for this topic filter.</p>";
        return;
      }

      const q = filteredQuestions[currentIndex];
      domainTag.innerText = q.domainName;

      if (currentMode === "flashcards") {
        isFlipped = false;
        contentArea.innerHTML = `
          <div class="flashcard-inner" onclick="flipCard()">
            <p class="question-text" id="cardText">${q.question}</p>
          </div>
          <button class="action-btn" onclick="nextCard()">Next Card</button>
        `;
      } else {
        // Quiz / Game Modes
        contentArea.innerHTML = `
          <p class="question-text">${q.question}</p>
          <div class="options-grid">
            ${q.options.map((opt, idx) => `
              <button class="option-btn" onclick="handleAnswer(${idx})">${opt}</button>
            `).join('')}
          </div>
        `;
      }
    }

    function handleAnswer(selectedIndex) {
      const q = filteredQuestions[currentIndex];
      const feedback = document.getElementById("feedback");

      playSound('drumroll');

      setTimeout(() => {
        if (selectedIndex === q.answer) {
          playSound('correct');
          feedback.style.color = "var(--accent-color)";
          feedback.innerHTML = `✓ Correct! ${q.explanation}`;
        } else {
          playSound('wrong');
          feedback.style.color = "#d97871";
          feedback.innerHTML = `✗ Incorrect. Try again!`;
        }
      }, 150);
    }

    function flipCard() {
      const q = filteredQuestions[currentIndex];
      const cardText = document.getElementById("cardText");
      playSound('drumroll');
      
      isFlipped = !isFlipped;
      if (isFlipped) {
        cardText.innerHTML = `<strong style="color: var(--accent-color)">Answer:</strong><br>${q.options[q.answer]}<br><br><small>${q.explanation}</small>`;
      } else {
        cardText.innerText = q.question;
      }
    }

    function nextCard() {
      currentIndex = (currentIndex + 1) % filteredQuestions.length;
      renderCurrentView();
    }

    // Initialize App
    renderCurrentView();
  </script>
</body>
</html>
