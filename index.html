<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EA Exam Part 2 - Interactive Suite</title>
  <style>
    :root {
      --bg-main: #f7f3f0;
      --text-main: #2d3732;
      --accent: #87a987;
      --card-bg: #ffffff;
      --border: #e2d7d5;
      --danger: #d97871;
    }

    body.theme-millionaire { --bg-main: #fbeee8; --text-main: #2b332e; --accent: #d4a359; --card-bg: #fffbf7; --border: #ebd6ce; }
    body.theme-detective { --bg-main: #3b4d43; --text-main: #f7f2f0; --accent: #f0c3be; --card-bg: #2d3c33; --border: #4a5e52; }
    body.theme-flashcards { --bg-main: #e9f0ec; --text-main: #27332c; --accent: #78a37d; --card-bg: #fdfdfd; --border: #d0ded3; }
    body.theme-matrix { --bg-main: #1e2823; --text-main: #e8f0eb; --accent: #a3d9b1; --card-bg: #141c18; --border: #2e3d35; }
    body.theme-basis { --bg-main: #f9ecea; --text-main: #332625; --accent: #d97871; --card-bg: #ffffff; --border: #f0c5c1; }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.2s ease; }
    body { background-color: var(--bg-main); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; padding: 1rem; }

    header {
      display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
      padding-bottom: 1rem; border-bottom: 2px solid var(--border); margin-bottom: 1.5rem; gap: 1rem;
    }

    h1 { font-size: 1.4rem; font-weight: 800; color: var(--accent); }
    .controls-bar { display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; }

    select, button {
      background: var(--card-bg); color: var(--text-main); border: 1.5px solid var(--border);
      padding: 0.5rem 1rem; border-radius: 0.6rem; font-weight: 600; cursor: pointer; outline: none;
    }
    select:focus, button:hover { border-color: var(--accent); }

    main { flex: 1; display: flex; justify-content: center; align-items: flex-start; padding: 1rem 0; }

    .millionaire-layout { display: flex; flex-wrap: wrap; gap: 1.5rem; width: 100%; max-width: 950px; }
    .game-panel { flex: 1; min-width: 300px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 1rem; padding: 1.5rem; }
    .ladder-panel { width: 260px; background: var(--card-bg); border: 2px solid var(--border); border-radius: 1rem; padding: 1rem; display: flex; flex-direction: column; gap: 0.2rem; }
    .ladder-step { font-size: 0.75rem; font-weight: 700; padding: 0.25rem 0.5rem; border-radius: 0.3rem; display: flex; justify-content: space-between; background: rgba(0,0,0,0.02); }
    .ladder-step.active { background: var(--accent); color: #fff; transform: scale(1.02); }

    .detective-card { background: var(--card-bg); border: 3px dashed var(--accent); border-radius: 0.5rem; max-width: 650px; width: 100%; padding: 2rem; position: relative; }
    .folder-tab { position: absolute; top: -1.5rem; left: 1rem; background: var(--accent); color: #fff; padding: 0.2rem 1rem; font-size: 0.8rem; font-weight: 700; border-radius: 0.4rem 0.4rem 0 0; }

    .matrix-card { background: var(--card-bg); border: 1px solid var(--accent); border-radius: 0.5rem; max-width: 700px; width: 100%; padding: 1.5rem; }
    .basis-card { background: var(--card-bg); border-top: 6px solid var(--danger); border-radius: 0.5rem; max-width: 650px; width: 100%; padding: 2rem; }

    .options-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; margin-top: 1.25rem; }
    .option-btn { text-align: left; width: 100%; padding: 0.85rem 1.2rem; border-radius: 0.6rem; font-size: 0.95rem; }
    .option-btn:hover { border-color: var(--accent); background: rgba(0,0,0,0.03); }
    .feedback { margin-top: 1.25rem; font-weight: 700; min-height: 1.5rem; }
    .strikes-bar { font-size: 1.1rem; margin-bottom: 1rem; font-weight: 800; color: var(--danger); }
  </style>
</head>
<body class="theme-millionaire">

  <header>
    <h1>EA Exam Suite: Part 2</h1>
    <div class="controls-bar">
      <label for="modeSelect">Mode:</label>
      <select id="modeSelect" onchange="switchMode(this.value)">
        <option value="millionaire">Millionaire Ladder</option>
        <option value="detective">Detective Casebook</option>
        <option value="flashcards">Flashcards (50+)</option>
        <option value="matrix">Matrix Terminal</option>
        <option value="basis">Basis Tax Alert</option>
      </select>

      <label for="chapterSelect">Chapter:</label>
      <select id="chapterSelect" onchange="filterChapter(this.value)">
        <option value="all">All 20 Chapters (Randomized)</option>
      </select>

      <button onclick="generateFreshBatch()">⚡ Generate New Question Set</button>
    </div>
  </header>

  <main id="mainContainer"></main>

  <script>
    /* ==========================================================================
       1. IRS EA PART 2 CHAPTER TOPICS & QUESTION GENERATOR
       ========================================================================== */
    const chapterTopics = [
      "Sole Proprietorships & Schedule C", "Partnership Formation & Sec. 721", "Partnership Distributions & Basis",
      "C-Corporation Formation & Sec. 351", "C-Corp Taxable Income & Dividends", "S-Corporation Eligibility & Election",
      "S-Corp Shareholder Basis Rules", "LLC Tax Classification & Elections", "MACRS Depreciation & Sec. 179",
      "Amortization & Intangibles", "Capital Gains & Sec. 1231 Assets", "Installment Sales & Like-Kind Exchanges",
      "Net Operating Losses (NOLs)", "Business Deductions & Expenses", "Employment & Payroll Taxes",
      "Trusts & Estates (Form 1041)", "Tax-Exempt Entities (Form 990)", "Retirement Plans for Business",
      "Accounting Methods & Inventories", "Foreign Business Tax Basics"
    ];

    const chapSelect = document.getElementById("chapterSelect");
    chapterTopics.forEach((topic, i) => {
      const opt = document.createElement("option");
      opt.value = i + 1;
      opt.innerText = `Chapter ${i + 1}: ${topic}`;
      chapSelect.appendChild(opt);
    });

    let masterQuestions = [];

    // Helper to shuffle choices and track correct answer position dynamically
    function buildRandomizedQuestion(id, chapterNum, topicName, stem, correctText, wrongTexts, explanationText) {
      let allOptions = [correctText, ...wrongTexts];
      
      // Shuffle choices array
      for (let i = allOptions.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allOptions[i], allOptions[j]] = [allOptions[j], allOptions[i]];
      }
      
      // Find where the correct answer ended up after shuffling (0, 1, 2, or 3)
      const correctIdx = allOptions.indexOf(correctText);

      return {
        id: id,
        chapter: chapterNum,
        chapterName: `Chapter ${chapterNum}: ${topicName}`,
        question: stem,
        options: allOptions,
        answer: correctIdx,
        explanation: explanationText
      };
    }

    function generateQuestionPool() {
      masterQuestions = [];
      let idCounter = 1;

      chapterTopics.forEach((topic, chIndex) => {
        const chapNum = chIndex + 1;

        // Realistic EA Part 2 Question 1
        masterQuestions.push(buildRandomizedQuestion(
          idCounter++, chapNum, topic,
          `Regarding ${topic}, which statement correctly reflects IRS tax treatment for federal filing?`,
          `Pass-through income or entity specific tax rules under the Internal Revenue Code govern treatment on the appropriate schedules.`,
          [
            `All income in this chapter is taxed at a flat 37% penalty rate regardless of entity filing.`,
            `No tax return filing is required if gross receipts are under $500,000.`,
            `Disallowed entirely under Section 1031 tax rules.`
          ],
          `IRC rules mandate specific entity-level or pass-through reporting rules for ${topic}.`
        ));

        // Realistic EA Part 2 Question 2 (Basis & Distributions)
        const randBase = (Math.floor(Math.random() * 6) + 3) * 1000;
        const randDist = randBase + (Math.floor(Math.random() * 4) + 1) * 1000;
        const gainVal = randDist - randBase;

        masterQuestions.push(buildRandomizedQuestion(
          idCounter++, chapNum, topic,
          `A partner or shareholder in a ${topic} context has an adjusted basis of $${randBase.toLocaleString()} and receives a cash distribution of $${randDist.toLocaleString()}. What is the recognized gain?`,
          `$${gainVal.toLocaleString()} Capital Gain`,
          [
            `$0 gain, adjusted basis reduces to negative $${gainVal.toLocaleString()}`,
            `$${randDist.toLocaleString()} Ordinary Dividend Income`,
            `$${randBase.toLocaleString()} Section 1231 Loss`
          ],
          `Cash distributions reduce basis down to $0. Any cash received in excess of basis ($${randDist.toLocaleString()} - $${randBase.toLocaleString()}) results in a $${gainVal.toLocaleString()} capital gain.`
        ));

        // Realistic EA Part 2 Question 3 (IRC Technical Rules)
        masterQuestions.push(buildRandomizedQuestion(
          idCounter++, chapNum, topic,
          `Under IRS guidelines for ${topic}, how are administrative elections or initial tax forms handled?`,
          `Filed on the required IRS forms (such as Form 1065, 1120-S, 8832, or Schedule C) by the specified due date or extension.`,
          [
            `Elections are made automatically by verbal agreement with an IRS auditor.`,
            `Must be notarized by a state judge prior to filing the federal tax return.`,
            `Can only be filed once every 10 tax years without IRS permission.`
          ],
          `Proper tax election forms must be timely filed with the IRS.`
        ));
      });
    }

    const prizeMoney = ["$100", "$200", "$300", "$500", "$1,000", "$2,000", "$4,000", "$8,000", "$16,000", "$32,000", "$64,000", "$125,000", "$250,000", "$500,000", "$1,000,000"];

    let currentMode = "millionaire";
    let currentChapter = "all";
    let currentIndex = 0;
    let strikes = 3;
    let activeQuestions = [];
    let isFlipped = false;

    /* ==========================================================================
       2. LOCAL STORAGE (PROGRESS SAVING)
       ========================================================================== */
    function saveProgress() {
      const state = { currentMode, currentChapter, currentIndex, strikes };
      localStorage.setItem("ea_exam_progress", JSON.stringify(state));
    }

    function loadProgress() {
      const saved = localStorage.getItem("ea_exam_progress");
      if (saved) {
        try {
          const state = JSON.parse(saved);
          currentMode = state.currentMode || "millionaire";
          currentChapter = state.currentChapter || "all";
          currentIndex = state.currentIndex || 0;
          strikes = state.strikes !== undefined ? state.strikes : 3;

          document.getElementById("modeSelect").value = currentMode;
          document.getElementById("chapterSelect").value = currentChapter;
          document.body.className = `theme-${currentMode}`;
        } catch (e) {
          console.error("Failed to load progress:", e);
        }
      }
    }

    /* ==========================================================================
       3. UTILITIES & SOUND ENGINE
       ========================================================================== */
    function shuffleArray(array) {
      let arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      const now = audioCtx.currentTime;

      if (type === 'correct') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(523.25, now);
        osc.frequency.exponentialRampToValueAtTime(783.99, now + 0.2);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
        osc.start(now); osc.stop(now + 0.3);
      } else if (type === 'wrong') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(160, now);
        osc.frequency.linearRampToValueAtTime(90, now + 0.25);
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        osc.start(now); osc.stop(now + 0.25);
      } else if (type === 'drumroll') {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.type = 'sine';
        osc.frequency.setValueAtTime(110, now);
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.12);
        osc.start(now); osc.stop(now + 0.12);
      }
    }

    /* ==========================================================================
       4. CONTROLLER & RENDERERS
       ========================================================================== */
    function generateFreshBatch() {
      generateQuestionPool();
      filterChapter(currentChapter);
    }

    function filterChapter(chap) {
      currentChapter = chap;
      let pool = chap === "all" ? masterQuestions : masterQuestions.filter(q => q.chapter == chap);
      // Re-shuffle order when chapter or mode changes
      activeQuestions = shuffleArray(pool);
      currentIndex = 0;
      strikes = 3;
      saveProgress();
      render();
    }

    function switchMode(mode) {
      currentMode = mode;
      document.body.className = `theme-${mode}`;
      // Scramble active pool when changing modes so each game feels completely different
      activeQuestions = shuffleArray(activeQuestions);
      currentIndex = 0;
      saveProgress();
      render();
    }

    function render() {
      const main = document.getElementById("mainContainer");
      if (activeQuestions.length === 0) {
        main.innerHTML = `<p>No questions found for this chapter.</p>`;
        return;
      }

      if (currentIndex >= activeQuestions.length) {
        currentIndex = 0;
      }

      const q = activeQuestions[currentIndex];

      if (currentMode === "millionaire") {
        main.innerHTML = `
          <div class="millionaire-layout">
            <div class="game-panel">
              <div class="strikes-bar">STRIKES: ${"❌".repeat(3 - strikes)}${"🔴".repeat(strikes)}</div>
              <h3>${q.chapterName}</h3>
              <p style="margin-top: 1rem; font-size: 1.1rem; font-weight: 600;">${q.question}</p>
              <div class="options-grid">
                ${q.options.map((opt, i) => `<button class="option-btn" onclick="handleAnswer(${i})"><b>${String.fromCharCode(65 + i)}:</b> ${opt}</button>`).join('')}
              </div>
              <div class="feedback" id="fb"></div>
            </div>
            <div class="ladder-panel">
              <h4 style="margin-bottom:0.5rem; text-align:center;">PRIZE LADDER</h4>
              ${prizeMoney.map((m, idx) => `
                <div class="ladder-step ${idx === currentIndex ? 'active' : ''}">
                  <span>${idx + 1}</span><span>${m}</span>
                </div>
              `).reverse().join('')}
            </div>
          </div>
        `;
      } else if (currentMode === "detective") {
        main.innerHTML = `
          <div class="detective-card">
            <div class="folder-tab">CASE FILE #${q.id}</div>
            <h3>🕵️ EVIDENCE CASE: ${q.chapterName}</h3>
            <p style="margin-top: 1rem; font-size: 1.1rem;">"${q.question}"</p>
            <div class="options-grid">
              ${q.options.map((opt, i) => `<button class="option-btn" onclick="handleAnswer(${i})">Inspect ${String.fromCharCode(65 + i)}: ${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="fb"></div>
          </div>
        `;
      } else if (currentMode === "matrix") {
        main.innerHTML = `
          <div class="matrix-card">
            <div style="display:flex; justify-content:space-between; font-family:monospace; margin-bottom:1rem;">
              <span>SYSTEM: ONLINE</span>
              <span>FIREWALL: ${"🛡️".repeat(strikes)}</span>
            </div>
            <p style="font-family: monospace; font-size: 1.1rem;">> ${q.question}</p>
            <div class="options-grid">
              ${q.options.map((opt, i) => `<button class="option-btn" style="font-family: monospace;" onclick="handleAnswer(${i})">[EXECUTE ${String.fromCharCode(65 + i)}] ${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="fb"></div>
          </div>
        `;
      } else if (currentMode === "flashcards") {
        isFlipped = false;
        main.innerHTML = `
          <div class="game-panel" style="max-width:600px; text-align:center; cursor:pointer;" onclick="flip()">
            <span style="font-size:0.85rem; font-weight:700; color:var(--accent);">${q.chapterName} (Card ${currentIndex + 1} of ${activeQuestions.length})</span>
            <div id="cardContent" style="min-height:180px; display:flex; align-items:center; justify-content:center; margin-top:1rem;">
              <p style="font-size:1.2rem; font-weight:600;">${q.question}</p>
            </div>
            <button class="option-btn" style="margin-top:1rem; text-align:center;" onclick="event.stopPropagation(); nextFC();">Next Flashcard ➔</button>
          </div>
        `;
      } else if (currentMode === "basis") {
        main.innerHTML = `
          <div class="basis-card">
            <h3 style="color:var(--danger);">⚠️ COMPLIANCE ALERT: ${q.chapterName}</h3>
            <p style="margin-top: 0.8rem; font-weight:600;">${q.question}</p>
            <div class="options-grid">
              ${q.options.map((opt, i) => `<button class="option-btn" onclick="handleAnswer(${i})"><b>Option ${String.fromCharCode(65 + i)}:</b> ${opt}</button>`).join('')}
            </div>
            <div class="feedback" id="fb"></div>
          </div>
        `;
      }
    }

    function handleAnswer(idx) {
      const q = activeQuestions[currentIndex];
      const fb = document.getElementById("fb");
      playSound('drumroll');

      setTimeout(() => {
        if (idx === q.answer) {
          playSound('correct');
          fb.style.color = "var(--accent)";
          fb.innerHTML = `✓ Correct! ${q.explanation}`;
          setTimeout(() => {
            currentIndex = (currentIndex + 1) % activeQuestions.length;
            saveProgress();
            render();
          }, 1600);
        } else {
          playSound('wrong');
          strikes--;
          saveProgress();
          fb.style.color = "var(--danger)";
          if (strikes <= 0) {
            fb.innerHTML = `💥 3 STRIKES! Restarting chapter pool...`;
            setTimeout(() => { filterChapter(currentChapter); }, 2000);
          } else {
            fb.innerHTML = `❌ Incorrect. ${strikes} strike(s) left!`;
          }
        }
      }, 150);
    }

    function flip() {
      const q = activeQuestions[currentIndex];
      const cardContent = document.getElementById("cardContent");
      playSound('drumroll');
      isFlipped = !isFlipped;
      if (isFlipped) {
        cardContent.innerHTML = `<div><strong style="color:var(--accent);">ANSWER:</strong><br>${q.options[q.answer]}<br><br><small>${q.explanation}</small></div>`;
      } else {
        cardContent.innerHTML = `<p style="font-size:1.2rem; font-weight:600;">${q.question}</p>`;
      }
    }

    function nextFC() {
      currentIndex = (currentIndex + 1) % activeQuestions.length;
      saveProgress();
      render();
    }

    // App Startup
    generateQuestionPool();
    loadProgress();
    filterChapter(currentChapter);
  </script>
</body>
</html>
